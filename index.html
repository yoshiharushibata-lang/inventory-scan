<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>棚卸スキャン</title>
  <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --line: #d9dde3;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0f62fe;
      --danger: #d93025;
      --ok: #137333;
      --shadow: 0 2px 10px rgba(0,0,0,0.08);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    .wrap {
      max-width: 780px;
      margin: 0 auto;
      padding: 12px;
      padding-bottom: 40px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 20px;
      margin: 0 0 10px;
    }

    h2 {
      font-size: 16px;
      margin: 0 0 10px;
    }

    .grid {
      display: grid;
      gap: 10px;
    }

    .grid-2 {
      grid-template-columns: 1fr 1fr;
    }

    @media (max-width: 640px) {
      .grid-2 { grid-template-columns: 1fr; }
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    select,
    input[type="text"],
    input[type="number"] {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 16px;
      background: #fff;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 10px;
      padding: 0 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      background: var(--primary);
      color: #fff;
    }

    button.secondary { background: #4b5563; }
    button.danger { background: var(--danger); }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      font-size: 14px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #eef4ff;
      color: #174ea6;
      border: 1px solid #c9dafc;
      white-space: pre-wrap;
    }

    .status.error {
      background: #fdecea;
      color: #b3261e;
      border-color: #f5c2c0;
    }

    .status.ok {
      background: #edf7ed;
      color: #137333;
      border-color: #c7e7cc;
    }

    .meta {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr 1fr;
    }

    @media (max-width: 640px) {
      .meta { grid-template-columns: 1fr; }
    }

    .meta-item {
      background: #fafbfc;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
    }

    .meta-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .meta-value {
      font-size: 16px;
      font-weight: 700;
    }

    .candidate-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .candidate-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fff;
      text-align: left;
      color: var(--text);
      cursor: pointer;
      width: 100%;
    }

    .candidate-item.selected {
      border: 2px solid var(--primary);
      background: #eef4ff;
    }

    .candidate-main {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .candidate-sub {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      word-break: break-word;
    }

    .pill {
      display: inline-block;
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #eef2ff;
      color: #374151;
      border: 1px solid #dbe2ff;
      margin-right: 6px;
      margin-bottom: 6px;
    }

    .small {
      font-size: 12px;
      color: var(--muted);
    }

    .preview-wrap {
      margin-top: 10px;
    }

    .preview-image {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--line);
      display: none;
      background: #fff;
    }

    .hidden {
      display: none !important;
    }

    #decodeCanvas {
      display: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>棚卸スキャン</h1>
      <div class="small">iPhone Safari では、背面カメラで撮影した画像からバーコードを読み取ります。</div>
    </div>

    <div class="card">
      <h2>基本情報</h2>
      <div class="grid grid-2">
        <div>
          <label for="operatorCode">担当者コード</label>
          <select id="operatorCode"></select>
        </div>
        <div>
          <label for="location">棚番号</label>
          <select id="location"></select>
        </div>
      </div>
      <div style="height:10px;"></div>
      <div class="meta">
        <div class="meta-item">
          <div class="meta-label">棚卸日</div>
          <div class="meta-value" id="inventoryDate">-</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">入力件数</div>
          <div class="meta-value" id="entryCount">-</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>バーコード読取</h2>
      <div class="row">
        <button id="takePhotoBtn" type="button">写真でバーコードを読む</button>
        <button id="retryPhotoBtn" type="button" class="secondary">再撮影</button>
      </div>
      <div style="height:10px;"></div>
      <div class="small">背面カメラでバーコードだけが大きく写るように撮影してください。撮影後に自動検索します。</div>
      <input id="barcodePhotoInput" type="file" accept="image/*" capture="environment" class="hidden" />
      <div class="preview-wrap">
        <img id="photoPreview" class="preview-image" alt="撮影画像プレビュー" />
      </div>
      <canvas id="decodeCanvas"></canvas>
    </div>

    <div class="card">
      <h2>検索入力</h2>
      <label for="barcodeInput">バーコード / JAN</label>
      <input id="barcodeInput" type="text" inputmode="numeric" placeholder="撮影結果または手入力" />
      <div style="height:10px;"></div>
      <div class="row">
        <button id="searchBtn" type="button">検索</button>
        <button id="clearBtn" type="button" class="secondary">クリア</button>
      </div>
    </div>

    <div class="card">
      <h2>候補</h2>
      <div id="candidateInfo" class="small">まだ候補はありません。</div>
      <div id="candidateList" class="candidate-list"></div>
    </div>

    <div class="card">
      <h2>保存</h2>
      <div id="selectedProductArea">
        <div class="small">選択中の商品はありません。</div>
      </div>
      <div style="height:10px;"></div>
      <label for="quantity">数量</label>
      <input id="quantity" type="number" min="1" step="1" value="1" />
      <div style="height:10px;"></div>
      <div class="row">
        <button id="saveMatchedBtn" type="button">一致保存</button>
        <button id="saveUnmatchedBtn" type="button" class="danger">候補なしでTEMP保存</button>
      </div>
    </div>

    <div id="statusBox" class="status">起動準備中...</div>
  </div>

  <script>
    const API_URL = 'https://yellow-dream-2d6b.yoshiharu-shibata.workers.dev/';
    const SAME_CODE_IGNORE_MS = 1500;

    const state = {
      scanLocked: false,
      decodeInFlight: false,
      searchInFlight: false,
      saveInFlight: false,
      lastScannedCode: '',
      lastScannedAt: 0,
      selectedProduct: null,
      currentItems: [],
      previewObjectUrl: null
    };

    const els = {
      operatorCode: document.getElementById('operatorCode'),
      location: document.getElementById('location'),
      inventoryDate: document.getElementById('inventoryDate'),
      entryCount: document.getElementById('entryCount'),
      takePhotoBtn: document.getElementById('takePhotoBtn'),
      retryPhotoBtn: document.getElementById('retryPhotoBtn'),
      barcodePhotoInput: document.getElementById('barcodePhotoInput'),
      photoPreview: document.getElementById('photoPreview'),
      decodeCanvas: document.getElementById('decodeCanvas'),
      barcodeInput: document.getElementById('barcodeInput'),
      searchBtn: document.getElementById('searchBtn'),
      clearBtn: document.getElementById('clearBtn'),
      candidateInfo: document.getElementById('candidateInfo'),
      candidateList: document.getElementById('candidateList'),
      selectedProductArea: document.getElementById('selectedProductArea'),
      quantity: document.getElementById('quantity'),
      saveMatchedBtn: document.getElementById('saveMatchedBtn'),
      saveUnmatchedBtn: document.getElementById('saveUnmatchedBtn'),
      statusBox: document.getElementById('statusBox')
    };

    document.addEventListener('DOMContentLoaded', async () => {
      populateOperatorCodes();
      populateLocations();
      bindEvents();
      updateButtons();
      await boot();
    });

    function bindEvents() {
      els.operatorCode.addEventListener('change', async () => { await boot(); });
      els.location.addEventListener('change', async () => { await boot(); });

      els.takePhotoBtn.addEventListener('click', () => {
        if (state.decodeInFlight || state.saveInFlight) return;
        els.barcodePhotoInput.click();
      });

      els.retryPhotoBtn.addEventListener('click', () => {
        if (state.decodeInFlight || state.saveInFlight) return;
        els.barcodePhotoInput.value = '';
        clearPreviewImage();
        releaseScanLock('');
        setStatus('再撮影できます。');
        els.barcodePhotoInput.click();
      });

      els.barcodePhotoInput.addEventListener('change', async (event) => {
        const file = event.target.files && event.target.files[0] ? event.target.files[0] : null;
        if (!file) return;
        await decodeBarcodeFromPhoto(file);
      });

      els.searchBtn.addEventListener('click', async () => {
        await searchByInput();
      });

      els.clearBtn.addEventListener('click', () => {
        clearSearchState(true);
        clearPreviewImage();
        els.barcodePhotoInput.value = '';
        releaseScanLock('');
        setStatus('入力欄と候補をクリアしました。');
      });

      els.barcodeInput.addEventListener('keydown', async (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          await searchByInput();
        }
      });

      els.saveMatchedBtn.addEventListener('click', async () => {
        await saveMatched();
      });

      els.saveUnmatchedBtn.addEventListener('click', async () => {
        await saveUnmatched();
      });
    }

    function populateOperatorCodes() {
      const values = [];
      for (let i = 1; i <= 10; i++) values.push(String(i).padStart(3, '0'));
      els.operatorCode.innerHTML = values.map(v => `<option value="${v}">${v}</option>`).join('');
      els.operatorCode.value = '001';
    }

    function populateLocations() {
      const rows = 'abcdefghijk'.split('');
      const values = [];
      rows.forEach(row => {
        for (let i = 1; i <= 10; i++) values.push(`${row}-${i}`);
      });
      els.location.innerHTML = values.map(v => `<option value="${v}">${v}</option>`).join('');
      els.location.value = 'a-1';
    }

    async function boot() {
      try {
        setStatus('初期データを取得しています...');
        const res = await apiPost({
          action: 'boot',
          operatorCode: els.operatorCode.value,
          location: els.location.value
        });

        if (!res || res.ok === false) {
          throw new Error(res && res.message ? res.message : 'boot failed');
        }

        const inventoryDate =
          res.inventoryDate ||
          res.inventory_date ||
          res.countDate ||
          res.date ||
          '-';

        const entryCount =
          res.entryCount ??
          res.entry_count ??
          res.inputCount ??
          res.count ??
          '-';

        els.inventoryDate.textContent = inventoryDate;
        els.entryCount.textContent = String(entryCount);

        setStatus('初期表示に成功しました。', 'ok');
      } catch (error) {
        setStatus(`初期データ取得に失敗しました: ${error.message}`, 'error');
      }
    }

    async function decodeBarcodeFromPhoto(file) {
      if (state.decodeInFlight || state.searchInFlight || state.saveInFlight) return;

      state.decodeInFlight = true;
      updateButtons();

      try {
        setPreviewImage(file);
        setStatus('画像からバーコードを読み取っています...');

        const image = await fileToImage(file);
        const decodedText = decodeWithZXingFromImage(image);
        const normalized = String(decodedText || '').trim();

        if (!normalized) {
          throw new Error('バーコードを読み取れませんでした。バーコードをもっと大きく、まっすぐ写して再撮影してください。');
        }

        const now = Date.now();
        if (state.lastScannedCode === normalized && now - state.lastScannedAt < SAME_CODE_IGNORE_MS) {
          setStatus('同じコードを連続で読み取りました。少し待ってから再撮影してください。');
          return;
        }

        state.scanLocked = true;
        state.lastScannedCode = normalized;
        state.lastScannedAt = now;

        els.barcodeInput.value = normalized;
        setStatus(`読み取り成功: ${normalized}\n自動検索しています...`);
        await searchByInput();
      } catch (error) {
        setStatus(`画像読取に失敗しました: ${error.message}`, 'error');
      } finally {
        state.decodeInFlight = false;
        updateButtons();
      }
    }

    function fileToImage(file) {
      return new Promise((resolve, reject) => {
        const objectUrl = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => {
          URL.revokeObjectURL(objectUrl);
          resolve(img);
        };
        img.onerror = () => {
          URL.revokeObjectURL(objectUrl);
          reject(new Error('画像の読み込みに失敗しました。'));
        };
        img.src = objectUrl;
      });
    }

    function buildZXingReader() {
      const hints = new Map();
      const formats = [
        ZXing.BarcodeFormat.EAN_13,
        ZXing.BarcodeFormat.EAN_8,
        ZXing.BarcodeFormat.UPC_A,
        ZXing.BarcodeFormat.UPC_E,
        ZXing.BarcodeFormat.CODE_128,
        ZXing.BarcodeFormat.CODE_39,
        ZXing.BarcodeFormat.ITF
      ];
      hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);
      hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

      const reader = new ZXing.MultiFormatReader();
      reader.setHints(hints);
      return reader;
    }

    function decodeWithZXingFromImage(image) {
      const reader = buildZXingReader();

      const attempts = [
        { x: 0.00, y: 0.00, w: 1.00, h: 1.00 },
        { x: 0.10, y: 0.45, w: 0.80, h: 0.22 },
        { x: 0.15, y: 0.40, w: 0.70, h: 0.26 },
        { x: 0.20, y: 0.35, w: 0.60, h: 0.30 },
        { x: 0.05, y: 0.35, w: 0.90, h: 0.35 },
        { x: 0.10, y: 0.25, w: 0.80, h: 0.45 }
      ];

      for (const area of attempts) {
        const text = tryDecodeArea(reader, image, area);
        if (text) return text;
      }

      return '';
    }

    function tryDecodeArea(reader, image, area) {
      const sourceWidth = image.naturalWidth || image.width;
      const sourceHeight = image.naturalHeight || image.height;

      const sx = Math.max(0, Math.floor(sourceWidth * area.x));
      const sy = Math.max(0, Math.floor(sourceHeight * area.y));
      const sw = Math.max(1, Math.floor(sourceWidth * area.w));
      const sh = Math.max(1, Math.floor(sourceHeight * area.h));

      const maxWidth = 2200;
      const scale = Math.min(1, maxWidth / sw);
      const dw = Math.max(1, Math.floor(sw * scale));
      const dh = Math.max(1, Math.floor(sh * scale));

      els.decodeCanvas.width = dw;
      els.decodeCanvas.height = dh;

      const ctx = els.decodeCanvas.getContext('2d', { willReadFrequently: true });
      ctx.clearRect(0, 0, dw, dh);
      ctx.drawImage(image, sx, sy, sw, sh, 0, 0, dw, dh);

      const imageData = ctx.getImageData(0, 0, dw, dh);
      const luminanceSource = new ZXing.RGBLuminanceSource(imageData.data, dw, dh);
      const binaryBitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminanceSource));

      try {
        const result = reader.decode(binaryBitmap);
        return result && result.getText ? result.getText() : '';
      } catch (error) {
        return '';
      } finally {
        try {
          reader.reset();
        } catch (e) {
        }
      }
    }

    function setPreviewImage(file) {
      clearPreviewImage();
      const objectUrl = URL.createObjectURL(file);
      state.previewObjectUrl = objectUrl;
      els.photoPreview.src = objectUrl;
      els.photoPreview.style.display = 'block';
    }

    function clearPreviewImage() {
      if (state.previewObjectUrl) {
        URL.revokeObjectURL(state.previewObjectUrl);
        state.previewObjectUrl = null;
      }
      els.photoPreview.removeAttribute('src');
      els.photoPreview.style.display = 'none';
    }

    async function searchByInput() {
      const keyword = String(els.barcodeInput.value || '').trim();
      if (!keyword) {
        setStatus('バーコード / JAN を入力してください。', 'error');
        return;
      }
      if (state.searchInFlight || state.saveInFlight) return;

      state.searchInFlight = true;
      updateButtons();
      clearCandidatesOnly();

      try {
        setStatus('商品を検索しています...');
        const res = await apiPost({
          action: 'search',
          keyword
        });

        if (!res || res.ok === false) {
          throw new Error(res && res.message ? res.message : 'search failed');
        }

        const items = Array.isArray(res.items) ? res.items : [];
        state.currentItems = items;

        if (items.length === 0) {
          state.selectedProduct = null;
          renderSelectedProduct();
          els.candidateInfo.textContent = '候補がありません。TEMP保存が可能です。';
          setStatus('候補なしです。必要なら候補なしでTEMP保存してください。');
          return;
        }

        if (items.length === 1) {
          state.selectedProduct = items[0];
          renderCandidates();
          renderSelectedProduct();
          els.candidateInfo.textContent = '候補1件のため自動選択しました。';
          setStatus('候補1件のため自動選択しました。数量を確認して一致保存してください。', 'ok');
          return;
        }

        state.selectedProduct = null;
        renderCandidates();
        renderSelectedProduct();
        els.candidateInfo.textContent = `候補が ${items.length} 件あります。1件タップしてください。`;
        setStatus(`候補が ${items.length} 件あります。選択してください。`, 'ok');
      } catch (error) {
        setStatus(`検索に失敗しました: ${error.message}`, 'error');
      } finally {
        state.searchInFlight = false;
        updateButtons();
      }
    }

    function renderCandidates() {
      els.candidateList.innerHTML = '';
      const items = state.currentItems || [];

      items.forEach((item) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'candidate-item' + (isSelectedProduct(item) ? ' selected' : '');
        btn.innerHTML = `
          <div class="candidate-main">${escapeHtml(getDisplayName(item))}</div>
          <div class="candidate-sub">${renderCandidateSub(item)}</div>
        `;
        btn.addEventListener('click', () => {
          state.selectedProduct = item;
          renderCandidates();
          renderSelectedProduct();
          setStatus('候補を選択しました。数量を入れて一致保存してください。', 'ok');
        });
        els.candidateList.appendChild(btn);
      });
    }

    function isSelectedProduct(item) {
      if (!state.selectedProduct || !item) return false;

      const a = getProductIdentity(state.selectedProduct);
      const b = getProductIdentity(item);

      if (a && b) return a === b;
      return state.selectedProduct === item;
    }

    function getProductIdentity(item) {
      return String(
        item.productKey ||
        item.product_key ||
        item.productCode ||
        item.product_code ||
        item.code ||
        item.jan ||
        item.JAN ||
        item.barcode ||
        ''
      );
    }

    function renderCandidateSub(item) {
      const parts = [];
      const code = item.productCode || item.product_code || item.code || item.productKey || item.product_key || '';
      const jan = item.jan || item.JAN || item.barcode || '';
      const spec = item.spec || item.standard || item.model || item.hinban || '';
      const maker = item.maker || item.brand || '';

      if (code) parts.push(`<span class="pill">商品コード: ${escapeHtml(String(code))}</span>`);
      if (jan) parts.push(`<span class="pill">JAN: ${escapeHtml(String(jan))}</span>`);
      if (maker) parts.push(`<span class="pill">メーカー: ${escapeHtml(String(maker))}</span>`);
      if (spec) parts.push(`<span class="pill">規格: ${escapeHtml(String(spec))}</span>`);

      return parts.join('');
    }

    function renderSelectedProduct() {
      const item = state.selectedProduct;
      if (!item) {
        els.selectedProductArea.innerHTML = `<div class="small">選択中の商品はありません。</div>`;
        return;
      }

      const code = item.productCode || item.product_code || item.code || item.productKey || item.product_key || '-';
      const jan = item.jan || item.JAN || item.barcode || '-';

      els.selectedProductArea.innerHTML = `
        <div class="candidate-item selected">
          <div class="candidate-main">${escapeHtml(getDisplayName(item))}</div>
          <div class="candidate-sub">
            <div><strong>商品コード:</strong> ${escapeHtml(String(code))}</div>
            <div><strong>JAN:</strong> ${escapeHtml(String(jan))}</div>
          </div>
        </div>
      `;
    }

    async function saveMatched() {
      if (state.saveInFlight) return;

      const quantity = parseQuantity();
      if (quantity === null) return;

      if (!state.selectedProduct) {
        setStatus('一致保存するには候補を1件選択してください。', 'error');
        return;
      }

      const inputValue = String(els.barcodeInput.value || '').trim();
      if (!inputValue) {
        setStatus('バーコード / JAN が空です。', 'error');
        return;
      }

      state.saveInFlight = true;
      updateButtons();

      try {
        setStatus('一致保存しています...');
        const res = await apiPost({
          action: 'save',
          operatorCode: els.operatorCode.value,
          location: els.location.value,
          quantity,
          inputMethod: 'camera_scan',
          inputValue,
          product: state.selectedProduct
        });

        if (!res || res.ok === false) {
          throw new Error(res && res.message ? res.message : 'save failed');
        }

        afterSaveSuccess(inputValue);
        await boot();
        setStatus('一致保存が完了しました。次の読取を待機しています。', 'ok');
      } catch (error) {
        setStatus(`一致保存に失敗しました: ${error.message}`, 'error');
      } finally {
        state.saveInFlight = false;
        updateButtons();
      }
    }

    async function saveUnmatched() {
      if (state.saveInFlight) return;

      const quantity = parseQuantity();
      if (quantity === null) return;

      const inputValue = String(els.barcodeInput.value || '').trim();
      if (!inputValue) {
        setStatus('候補なし保存するにはバーコード / JAN が必要です。', 'error');
        return;
      }

      state.saveInFlight = true;
      updateButtons();

      try {
        setStatus('候補なしでTEMP保存しています...');
        const res = await apiPost({
          action: 'save',
          operatorCode: els.operatorCode.value,
          location: els.location.value,
          quantity,
          inputMethod: 'unmatched',
          inputValue
        });

        if (!res || res.ok === false) {
          throw new Error(res && res.message ? res.message : 'save failed');
        }

        afterSaveSuccess(inputValue);
        await boot();
        setStatus('候補なしでTEMP保存が完了しました。次の読取を待機しています。', 'ok');
      } catch (error) {
        setStatus(`候補なし保存に失敗しました: ${error.message}`, 'error');
      } finally {
        state.saveInFlight = false;
        updateButtons();
      }
    }

    function parseQuantity() {
      const quantity = Number(els.quantity.value);
      if (!Number.isInteger(quantity) || quantity <= 0) {
        setStatus('数量は1以上の整数を入力してください。', 'error');
        return null;
      }
      return quantity;
    }

    function afterSaveSuccess(savedInputValue) {
      clearSearchState(false);
      els.barcodeInput.value = '';
      els.barcodePhotoInput.value = '';
      clearPreviewImage();
      releaseScanLock(savedInputValue);
      els.barcodeInput.focus();
    }

    function releaseScanLock(recentCode) {
      state.scanLocked = false;
      state.lastScannedCode = String(recentCode || '').trim();
      state.lastScannedAt = state.lastScannedCode ? Date.now() : 0;
    }

    function clearSearchState(clearInput) {
      if (clearInput) els.barcodeInput.value = '';
      els.quantity.value = '1';
      state.selectedProduct = null;
      state.currentItems = [];
      renderCandidates();
      renderSelectedProduct();
      els.candidateInfo.textContent = 'まだ候補はありません。';
    }

    function clearCandidatesOnly() {
      state.selectedProduct = null;
      state.currentItems = [];
      renderCandidates();
      renderSelectedProduct();
      els.candidateInfo.textContent = '検索結果を待っています。';
    }

    function updateButtons() {
      const busy = state.decodeInFlight || state.searchInFlight || state.saveInFlight;
      els.takePhotoBtn.disabled = busy;
      els.retryPhotoBtn.disabled = busy;
      els.searchBtn.disabled = busy;
      els.clearBtn.disabled = state.saveInFlight;
      els.saveMatchedBtn.disabled = state.saveInFlight;
      els.saveUnmatchedBtn.disabled = state.saveInFlight;
    }

    async function apiPost(payload) {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
      });

      const text = await res.text();

      let json;
      try {
        json = JSON.parse(text);
      } catch (error) {
        throw new Error(`JSON解析失敗: ${text.slice(0, 300)}`);
      }

      if (!res.ok) {
        throw new Error(json.message || json.error || `HTTP ${res.status}`);
      }

      return json;
    }

    function getDisplayName(item) {
      return item.productName ||
        item.product_name ||
        item.name ||
        item.itemName ||
        item.displayLabel ||
        '名称未設定';
    }

    function setStatus(message, type) {
      els.statusBox.textContent = message;
      els.statusBox.className = 'status';

      if (type === 'error') {
        els.statusBox.classList.add('error');
      } else if (type === 'ok') {
        els.statusBox.classList.add('ok');
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }
  </script>
</body>
</html>
